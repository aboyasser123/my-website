<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث الخادم | أحمد الحمود</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0f1e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: rgba(17, 23, 43, 0.9);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 25px;
            padding: 40px;
            max-width: 550px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            font-size: 35px;
        }

        h1 { color: #00d4ff; font-size: 1.8rem; margin-bottom: 20px; }

        .reason-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: right;
            border-right: 3px solid #00d4ff;
        }

        .reason-box p { line-height: 1.6; color: #ccc; font-size: 1rem; margin-bottom: 8px; }
        .highlight { color: #fff; font-weight: bold; }

        .countdown-circle {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d4ff;
            margin: 15px 0;
        }

        .btn-redirect {
            display: block;
            background: #00d4ff;
            color: #0a0f1e;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 15px;
        }

        .btn-redirect:hover { background: #00b5e0; transform: scale(1.02); }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .card { padding: 30px 20px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="icon-box">
            <i class="fas fa-rocket"></i>
        </div>
        
        <h1>تم تحديث الخادم</h1>
        
        <div class="reason-box">
            <p><i class="fas fa-check-circle me-2" style="color:#00d4ff"></i> <span class="highlight">السبب:</span> تحسين سرعة استجابة الموقع وأمان البيانات.</p>
            <p><i class="fas fa-check-circle me-2" style="color:#00d4ff"></i> <span class="highlight">الإجراء:</span> نقل المحتوى بالكامل لسيرفر جديد أكثر استقراراً.</p>
        </div>

        <p style="color: #888; font-size: 0.9rem;">سيتم توجيهك تلقائياً خلال:</p>
        <div class="countdown-circle" id="countdown">5</div>

        <a href="https://personal-website-ahmadalhammoud.wuaze.com/index.html" class="btn-redirect">
            الانتقال للموقع الجديد الآن
        </a>

        <p style="margin-top: 20px; font-size: 0.8rem; color: #555;">شكراً لتفهمكم - أحمد الحمود</p>
    </div>

    <script>
        const url = 'https://personal-website-ahmadalhammoud.wuaze.com/index.html';
        let time = 5;
        const display = document.getElementById('countdown');

        const timer = setInterval(() => {
            time--;
            display.textContent = time;
            if (time <= 0) {
                clearInterval(timer);
                window.location.href = url;
            }
        }, 1000);
    </script>
</body>
</html>
